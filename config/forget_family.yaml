model_family: llama3-8b
model_path: /content/drive/MyDrive/Unlearning/ft_model_checkpoint/ft_llama3_8b
config_path: config/

lr: null
percent_blocks_dropped: 0_dropped
percent_blocks_freezed: 25_freezed
unlearn_data_id: 0
unlearn_data_count: null
data_path: synthetic_data/family_relationships.pt
subsample_path: synthetic_data/subsample.pt
batch_size: 4
# batch_size: 1
gradient_accumulation_steps: 4
# gradient_accumulation_steps: 1
forget_loss: ga
# none <=> only forget loss, combined <=> forget + finetuning on retain 
retain_mode: none
retain_loss_weight: 1.0
retain_data_count: null

save_dir: /content/drive/MyDrive/Unlearning/unlearning_checkpoint/${forget_loss}/${model_family}/${percent_blocks_dropped}/${percent_blocks_freezed}/${unlearn_data_id}
overwrite_dir: false
weight_decay: 0.01
# save_step_pattern: "log"
# save_step_pattern: "epoch_between_4_8"
save_step_pattern: "every_epoch"
seed: 42